name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Sync dependencies
        run: make sync
      - name: Run CI
        run: make ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml

  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install native dependencies
        run: |
          brew install ffmpeg
      - name: Sync dependencies
        run: make sync
      - name: Run smoke tests
        run: make test
