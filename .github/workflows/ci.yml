name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: lint-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: false
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
      - name: Sync dependencies
        run: make sync
      - name: Smoke CLI help
        run: |
          uv run webinar-transcriber --help
      - name: Smoke whisper runtime
        if: runner.os == 'macOS'
        run: |
          uv run python -c "from pywhispercpp.model import Model; assert Model.system_info().strip()"
      - name: Run CI
        run: make check
      - name: Upload coverage
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml

  test-llm-extra-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: false
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
      - name: Sync dependencies with LLM extra
        run: uv sync --extra llm --group dev
      - name: Run LLM tests
        run: uv run pytest --no-cov webinar_transcriber/tests/test_llm.py
