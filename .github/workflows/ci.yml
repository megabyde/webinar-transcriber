name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Sync dependencies
        run: make sync
      - name: Smoke CLI help
        run: |
          uv run webinar-transcriber --help
      - name: Run CI
        run: make check
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml

  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-
      - name: Install native dependencies
        run: |
          brew install ffmpeg whisper-cpp
      - name: Sync dependencies
        run: make sync
      - name: Smoke CLI help
        run: |
          uv run webinar-transcriber --help
      - name: Smoke whisper runtime
        run: |
          uv run python -c "from webinar_transcriber.whispercpp import WhisperCppLibrary; lib = WhisperCppLibrary(); assert lib.system_info().strip()"
      - name: Run smoke tests
        run: make test

  test-llm-extra-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-
      - name: Sync dependencies with LLM extra
        run: uv sync --extra llm --group dev
      - name: Run LLM tests
        run: uv run pytest --no-cov webinar_transcriber/tests/test_llm.py
