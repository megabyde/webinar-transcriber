name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    name: lint-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --extra llm --group dev
      - name: Smoke CLI help
        run: uv run webinar-transcriber --help
      - name: Smoke whisper runtime
        run: uv run python -c "from pywhispercpp.model import Model; assert Model.system_info().strip()"
      - name: Check Markdown formatting
        run: uv run mdformat --check AGENTS.md LICENSE-3RDPARTY.md README.md
      - name: Lint Markdown
        run: uv run pymarkdown scan AGENTS.md LICENSE-3RDPARTY.md README.md
      - name: Check Python formatting
        run: uv run ruff format --check .
      - name: Lint Python
        run: uv run ruff check .
      - name: Type check
        run: uv run ty check webinar_transcriber
      - name: Run tests
        run: uv run pytest --cov-report=xml
      - name: Run LLM tests
        run: uv run pytest --no-cov webinar_transcriber/tests/test_llm.py
