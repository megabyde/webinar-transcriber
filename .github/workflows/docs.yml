name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
  pull_request:
    paths:
      - "README.md"
      - "docs/**"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: make sync
      - name: Lint docs through Ruff
        run: make lint
