name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate:
    name: validate (${{ matrix.os }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: make sync-llm

      - name: Smoke CLI help
        run: uv run webinar-transcriber --help

      - name: Smoke whisper runtime
        run: uv run python -c "from pywhispercpp.model import Model; assert Model.system_info().strip()"

      - name: Lint and test
        run: make check

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: make sync-llm

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  publish-testpypi:
    needs: release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/webinar-transcriber
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/webinar-transcriber
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
