name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate:
    name: validate (${{ matrix.os }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --extra llm --group dev

      - name: Smoke CLI help
        run: uv run webinar-transcriber --help

      - name: Smoke whisper runtime
        run: uv run python -c "from pywhispercpp.model import Model; assert Model.system_info().strip()"

      - name: Lint
        run: make lint

      - name: Test
        run: make test-all

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --extra llm --group dev

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
