<svg
    xmlns="http://www.w3.org/2000/svg"
    width="160"
    height="160"
    viewBox="0 0 160 160"
    role="img"
    aria-labelledby="title desc"
>
    <title id="title">Webinar Transcriber logo</title>
    <desc id="desc">A minimal abstract mark with layered panes and an audio waveform.</desc>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#07111F" />
            <stop offset="100%" stop-color="#10243A" />
        </linearGradient>
        <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#182C45" />
            <stop offset="100%" stop-color="#0C1726" />
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5EEAD4" />
            <stop offset="55%" stop-color="#38BDF8" />
            <stop offset="100%" stop-color="#F59E0B" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#030915" flood-opacity="0.34" />
        </filter>
    </defs>

    <rect width="160" height="160" rx="36" fill="url(#bg)" />

    <g opacity="0.22">
        <circle cx="126" cy="34" r="22" fill="#38BDF8" />
        <circle cx="34" cy="126" r="18" fill="#5EEAD4" />
    </g>

    <g filter="url(#shadow)">
        <rect
            x="34"
            y="30"
            width="66"
            height="82"
            rx="20"
            transform="rotate(-10 34 30)"
            fill="#0B1523"
            stroke="#29405A"
        />
        <rect
            x="52"
            y="38"
            width="74"
            height="90"
            rx="22"
            transform="rotate(8 52 38)"
            fill="url(#glass)"
            stroke="#35506E"
        />
    </g>

    <path
        d="M42 84 H57 L66 62 L78 106 L89 73 L100 92 L110 55 L122 98"
        fill="none"
        stroke="url(#accent)"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="7"
    />

    <rect x="42" y="120" width="56" height="8" rx="4" fill="#314B67" />
    <rect x="104" y="120" width="18" height="8" rx="4" fill="#5EEAD4" />
</svg>
